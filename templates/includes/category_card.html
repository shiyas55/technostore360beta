<a href="{% url 'product_list' %}?category={{ category.slug }}" class="card card-hover" style="padding: 1.25rem; text-decoration: none; display: flex; flex-direction: column; gap: 0.5rem; text-align: left;">
  <div style="background-color: var(--slate-100); width: 2.25rem; height: 2.25rem; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--primary-blue);">
    <i data-lucide="{{ category.icon|default:'layers' }}" style="width: 1.25rem; height: 1.25rem;"></i>
  </div>
  <h3 style="font-size: 1rem; font-weight: 700; color: var(--slate-900);">{{ category.name }}</h3>
  <p style="font-size: 0.75rem; color: var(--slate-500); line-height: 1.3;">{{ category.description }}</p>
</a>
