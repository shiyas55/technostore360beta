{% extends 'dashboard/base.html' %}

{% block title %}Create Coupon - TechnoStore360 Admin{% endblock %}

{% block admin_content %}
<div class="space-y-6 max-w-2xl">
  <div>
    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight font-display">Create Promo Coupon</h1>
    <p class="text-sm text-slate-500 mt-1">Configure discount rates, minimum purchases, and date schedules.</p>
  </div>

  <form method="POST" class="bg-white shadow rounded-lg border border-slate-200 p-6 space-y-6">
    {% csrf_token %}
    
    <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
      <div class="form-group">
        <label for="code" class="block text-sm font-bold text-slate-700">Coupon Code *</label>
        <input type="text" name="code" id="code" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm placeholder-slate-400 font-mono" placeholder="e.g. B2BSAVE15">
      </div>
      
      <div class="form-group">
        <label for="discount_type" class="block text-sm font-bold text-slate-700">Discount Type *</label>
        <select name="discount_type" id="discount_type" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
          <option value="percentage">Percentage (%)</option>
          <option value="fixed">Fixed Amount (INR)</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-1 gap-6 sm:grid-cols-3">
      <div class="form-group">
        <label for="value" class="block text-sm font-bold text-slate-700">Discount Value *</label>
        <input type="number" name="value" id="value" required step="0.01" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
      </div>
      <div class="form-group">
        <label for="min_purchase" class="block text-sm font-bold text-slate-700">Min Purchase *</label>
        <input type="number" name="min_purchase" id="min_purchase" required step="0.01" value="0.00" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
      </div>
      <div class="form-group">
        <label for="max_discount" class="block text-sm font-bold text-slate-700">Max Discount (INR)</label>
        <input type="number" name="max_discount" id="max_discount" step="0.01" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="Optional cap">
      </div>
    </div>

    <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 border-t border-slate-100 pt-4">
      <div class="form-group">
        <label for="start_date" class="block text-sm font-bold text-slate-700">Start Date & Time *</label>
        <input type="datetime-local" name="start_date" id="start_date" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
      </div>
      <div class="form-group">
        <label for="end_date" class="block text-sm font-bold text-slate-700">End Date & Time *</label>
        <input type="datetime-local" name="end_date" id="end_date" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
      </div>
    </div>

    <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 border-t border-slate-100 pt-4">
      <div class="form-group">
        <label for="usage_limit" class="block text-sm font-bold text-slate-700">Overall Usage Limit</label>
        <input type="number" name="usage_limit" id="usage_limit" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="No limit if empty">
      </div>
      <div class="form-group flex items-center pt-6">
        <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
          <input type="checkbox" name="is_active" id="is_active" checked class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
          <span class="font-bold">Set Coupon Active</span>
        </label>
      </div>
    </div>

    <div class="border-t border-slate-100 pt-4 flex items-center justify-end gap-3">
      <a href="{% url 'admin_coupons' %}" class="inline-flex justify-center py-2 px-4 border border-slate-300 shadow-sm text-sm font-bold rounded-md text-slate-700 bg-white hover:bg-slate-50 transition duration-150">Cancel</a>
      <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-bold rounded-md text-white bg-blue-600 hover:bg-blue-700 transition duration-150">Create Coupon</button>
    </div>

  </form>
</div>
{% endblock %}
