<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - TechnoStore360</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
</head>
<body class="h-full flex items-center justify-center px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-md border border-slate-200">
    <div>
      <h2 class="mt-2 text-center text-3xl font-extrabold text-slate-900 tracking-tight">Admin & Vendor Desk</h2>
      <p class="mt-2 text-center text-sm text-slate-500">Sign in with manager or administrator credentials.</p>
    </div>
    
    {% if messages %}
      <div class="rounded-md bg-red-50 p-4 border border-red-200">
        <div class="text-sm font-semibold text-red-700">
          {% for message in messages %}
            <p>{{ message }}</p>
          {% endfor %}
        </div>
      </div>
    {% endif %}

    <form class="mt-8 space-y-6" method="POST" action="{% url 'admin_login' %}">
      {% csrf_token %}
      <div class="rounded-md shadow-sm -space-y-px">
        <div>
          <label for="username" class="sr-only">Username</label>
          <input id="username" name="username" type="text" required class="appearance-none rounded-none relative block w-full px-3 py-2 border border-slate-300 placeholder-slate-500 text-slate-900 rounded-t-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" placeholder="Username or Corporate Email">
        </div>
        <div>
          <label for="password" class="sr-only">Password</label>
          <input id="password" name="password" type="password" required class="appearance-none rounded-none relative block w-full px-3 py-2 border border-slate-300 placeholder-slate-500 text-slate-900 rounded-b-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" placeholder="Password">
        </div>
      </div>

      <div>
        <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-bold rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-155">
          Sign In as Administrator
        </button>
      </div>
    </form>
    
    <div class="text-center mt-4 border-t border-slate-100 pt-4">
      <a href="{% url 'home' %}" class="text-xs font-semibold text-slate-500 hover:text-blue-600 transition">Return to Main Marketplace</a>
    </div>
  </div>
</body>
</html>
